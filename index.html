<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyManager - 家計管理アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="8" fill="#2563EB"/>
            <path d="M7 14h14M14 7v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="14" cy="14" r="4" stroke="white" stroke-width="2"/>
          </svg>
          <span class="logo-text">MoneyManager</span>
        </div>
        <div class="header-meta">
          <span id="current-month-label" class="month-badge"></span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Summary Cards -->
      <section class="summary-section">
        <div class="summary-card total-card">
          <div class="card-icon income-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 3v14M3 10l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="card-info">
            <span class="card-label">今月の収入</span>
            <span class="card-amount income-amount" id="total-income">¥0</span>
          </div>
        </div>
        <div class="summary-card total-card">
          <div class="card-icon expense-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 17V3M3 10l7 7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="card-info">
            <span class="card-label">今月の支出</span>
            <span class="card-amount expense-amount" id="total-expense">¥0</span>
          </div>
        </div>
        <div class="summary-card balance-card">
          <div class="card-icon balance-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="2"/>
              <path d="M10 6v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="card-info">
            <span class="card-label">残高</span>
            <span class="card-amount balance-amount" id="balance">¥0</span>
          </div>
        </div>
      </section>

      <!-- Category Breakdown -->
      <section class="category-section">
        <h2 class="section-title">カテゴリ別支出</h2>
        <div class="category-grid" id="category-breakdown"></div>
      </section>

      <!-- Two-column layout -->
      <div class="two-col-layout">
        <!-- Left: Add Transaction Form -->
        <section class="form-section card">
          <h2 class="section-title">取引を追加</h2>
          <form id="transaction-form" class="transaction-form" novalidate>
            <!-- Type Toggle -->
            <div class="form-group">
              <div class="type-toggle">
                <button type="button" class="type-btn active" data-type="expense">支出</button>
                <button type="button" class="type-btn" data-type="income">収入</button>
              </div>
              <input type="hidden" id="transaction-type" value="expense" />
            </div>

            <div class="form-group">
              <label class="form-label" for="transaction-date">日付</label>
              <input type="date" id="transaction-date" class="form-control" required />
            </div>

            <div class="form-group">
              <label class="form-label" for="transaction-category">カテゴリ</label>
              <div class="select-wrapper">
                <select id="transaction-category" class="form-control" required>
                  <option value="">カテゴリを選択</option>
                  <optgroup label="支出">
                    <option value="食費">食費</option>
                    <option value="交通費">交通費</option>
                    <option value="娯楽">娯楽</option>
                    <option value="光熱費">光熱費</option>
                    <option value="住居費">住居費</option>
                    <option value="医療費">医療費</option>
                    <option value="衣服費">衣服費</option>
                    <option value="通信費">通信費</option>
                    <option value="その他">その他</option>
                  </optgroup>
                  <optgroup label="収入">
                    <option value="給与">給与</option>
                    <option value="副収入">副収入</option>
                    <option value="ボーナス">ボーナス</option>
                    <option value="その他収入">その他収入</option>
                  </optgroup>
                </select>
                <span class="select-arrow">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="transaction-amount">金額 (円)</label>
              <div class="input-with-prefix">
                <span class="input-prefix">¥</span>
                <input type="number" id="transaction-amount" class="form-control" placeholder="0" min="1" required />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="transaction-memo">メモ（任意）</label>
              <input type="text" id="transaction-memo" class="form-control" placeholder="例: スーパーで買い物" maxlength="50" />
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              追加する
            </button>
          </form>
        </section>

        <!-- Right: Chart -->
        <section class="chart-section card">
          <div class="chart-header">
            <h2 class="section-title">月別支出グラフ</h2>
          </div>
          <div class="chart-container">
            <canvas id="monthly-chart"></canvas>
          </div>
          <div class="chart-legend" id="chart-legend"></div>
        </section>
      </div>

      <!-- Transaction List -->
      <section class="list-section card">
        <div class="list-header">
          <h2 class="section-title">取引履歴</h2>
          <div class="list-controls">
            <div class="select-wrapper small">
              <select id="month-filter" class="form-control small">
                <option value="">すべて表示</option>
              </select>
              <span class="select-arrow">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
            <div class="select-wrapper small">
              <select id="sort-order" class="form-control small">
                <option value="date-desc">日付 新しい順</option>
                <option value="date-asc">日付 古い順</option>
                <option value="amount-desc">金額 高い順</option>
                <option value="amount-asc">金額 低い順</option>
              </select>
              <span class="select-arrow">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
          </div>
        </div>
        <div id="transaction-list" class="transaction-list">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="20" stroke="#CBD5E1" stroke-width="2"/>
              <path d="M24 16v8M24 28v4" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <p>まだ取引がありません</p>
            <span>上のフォームから取引を追加してください</span>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>MoneyManager &copy; 2026 &mdash; データはブラウザのlocalStorageに保存されます</p>
    </footer>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
